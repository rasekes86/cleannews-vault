<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CleanNews Vault</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Header -->
  <header class="sp-header">
    <div class="sp-header-inner">
      <div class="sp-brand">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
        <span class="sp-title">CleanNews Vault</span>
      </div>
      <button id="theme-toggle" class="theme-toggle" title="Cambiar tema">
        <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </div>
  </header>

  <!-- Search -->
  <div class="sp-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input type="text" id="search-input" placeholder="Buscar artículos..." autocomplete="off">
  </div>

  <!-- Quick Filters -->
  <div class="sp-filters">
    <button class="sp-filter-btn active" data-filter="all">Todos</button>
    <button class="sp-filter-btn" data-filter="favorites">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
      Favoritos
    </button>
    <button class="sp-filter-btn" data-filter="unread">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle></svg>
      No leídos
    </button>
  </div>

  <!-- Articles List -->
  <div id="articles-list" class="sp-articles-list">
    <!-- Rendered by JS -->
  </div>

  <!-- Empty State -->
  <div id="empty-state" class="sp-empty hidden">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
    </svg>
    <p>No hay artículos</p>
  </div>

  <!-- Stats Footer -->
  <footer class="sp-footer">
    <div class="sp-stats">
      <span id="stat-total" class="sp-stat">0 artículos</span>
      <span class="sp-stat-divider">·</span>
      <span id="stat-unread" class="sp-stat">0 sin leer</span>
    </div>
    <a id="library-link" href="#" class="sp-library-link">
      Abrir Biblioteca Completa
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </a>
  </footer>

  <!-- Toast -->
  <div id="toast" class="toast hidden">
    <span id="toast-message"></span>
  </div>

  <script src="../utils/db.js"></script>
  <script src="../utils/url.js"></script>
  <script src="../utils/search.js"></script>
  <script src="../utils/storage.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
