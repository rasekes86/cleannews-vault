<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CleanNews Vault</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="header-brand">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
        <span>CleanNews Vault</span>
      </div>
      <span class="header-version">v3.0</span>
    </header>

    <!-- Info -->
    <div class="popup-body">
      <div class="info-card">
        <div class="info-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 16v-4"></path>
            <path d="M12 8h.01"></path>
          </svg>
        </div>
        <h3 class="info-title">Usa el botón flotante verde</h3>
        <p class="info-desc">Haz clic en el botón circular verde en la esquina inferior derecha de cualquier página para abrir el panel lateral.</p>
      </div>

      <!-- Quick Actions -->
      <div class="actions-grid">
        <button id="btn-toggle" class="action-btn action-btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
          <span>Abrir Panel</span>
        </button>
        <button id="btn-library" class="action-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
          <span>Biblioteca</span>
        </button>
        <button id="btn-extract" class="action-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
          <span>Extraer Ahora</span>
        </button>
      </div>

      <!-- Shortcuts -->
      <div class="shortcuts">
        <p class="shortcuts-title">Atajos de teclado</p>
        <div class="shortcut-row">
          <kbd>Alt+B</kbd>
          <span>Abrir/cerrar panel</span>
        </div>
        <div class="shortcut-row">
          <kbd>Alt+E</kbd>
          <span>Abrir popup</span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="popup-footer">
      <span>Clic derecho → "Extraer con CleanNews Vault"</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
