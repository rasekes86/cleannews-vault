<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CleanNews Vault</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header class="popup-header">
    <div class="header-left">
      <svg class="header-logo" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
      </svg>
      <span class="header-title">CleanNews Vault</span>
    </div>
    <button id="theme-toggle" class="theme-toggle" title="Cambiar tema">
      <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>
  </header>

  <!-- Loading State -->
  <div id="loading-state" class="state-view">
    <div class="spinner"></div>
    <p class="state-text">Extrayendo contenido...</p>
  </div>

  <!-- Error State -->
  <div id="error-state" class="state-view hidden">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="state-icon">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="15" y1="9" x2="9" y2="15"></line>
      <line x1="9" y1="9" x2="15" y2="15"></line>
    </svg>
    <p id="error-message" class="state-text">No se pudo extraer el contenido.</p>
    <button id="retry-btn" class="btn btn-secondary">Reintentar</button>
  </div>

  <!-- Already Saved State -->
  <div id="saved-state" class="state-view hidden">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5" class="state-icon">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
      <polyline points="22 4 12 14.01 9 11.01"></polyline>
    </svg>
    <p class="state-text">Este artículo ya está guardado</p>
    <h3 id="saved-title" class="saved-title"></h3>
    <button id="open-saved-btn" class="btn btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      Abrir
    </button>
  </div>

  <!-- Content Preview State -->
  <div id="content-state" class="content-state hidden">
    <div class="article-preview">
      <!-- Featured Image -->
      <div id="featured-image-container" class="featured-image-container hidden">
        <img id="featured-image" class="featured-image" src="" alt="">
      </div>

      <h2 id="article-title" class="article-title"></h2>

      <div class="article-meta">
        <span id="article-source" class="meta-item meta-source">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
          <span></span>
        </span>
        <span id="article-author" class="meta-item">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          <span></span>
        </span>
        <span id="article-date" class="meta-item">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          <span></span>
        </span>
      </div>

      <div class="article-stats">
        <span id="article-words" class="stat-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
          <span></span>
        </span>
        <span id="article-readtime" class="stat-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          <span></span>
        </span>
      </div>

      <div class="article-excerpt-container">
        <p id="article-excerpt" class="article-excerpt"></p>
      </div>
    </div>

    <!-- Tags Input with Autocomplete -->
    <div class="tags-section">
      <label for="tags-input" class="tags-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
        Etiquetas
      </label>
      <div class="tags-input-wrapper">
        <input type="text" id="tags-input" class="tags-input" placeholder="tecnología, ciencia, opinión..." autocomplete="off">
        <div id="tags-suggestions" class="tags-suggestions hidden"></div>
      </div>
      <div id="tags-chips" class="tags-chips"></div>
      <p class="tags-hint">Separadas por comas o Enter</p>
    </div>

    <!-- Collection Selector -->
    <div class="collection-section">
      <label for="collection-select" class="collection-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
        Colección
      </label>
      <div class="collection-select-wrapper">
        <select id="collection-select" class="collection-select">
          <option value="">Sin colección</option>
        </select>
        <button id="new-collection-btn" class="new-collection-btn" title="Crear colección">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
      </div>
      <!-- Inline Collection Creation -->
      <div id="new-collection-form" class="new-collection-form hidden">
        <input type="text" id="new-collection-name" class="new-collection-input" placeholder="Nombre de la colección">
        <div class="new-collection-colors">
          <button class="color-dot active" data-color="#ef4444" style="background:#ef4444"></button>
          <button class="color-dot" data-color="#f97316" style="background:#f97316"></button>
          <button class="color-dot" data-color="#eab308" style="background:#eab308"></button>
          <button class="color-dot" data-color="#22c55e" style="background:#22c55e"></button>
          <button class="color-dot" data-color="#06b6d4" style="background:#06b6d4"></button>
          <button class="color-dot" data-color="#3b82f6" style="background:#3b82f6"></button>
          <button class="color-dot" data-color="#8b5cf6" style="background:#8b5cf6"></button>
          <button class="color-dot" data-color="#ec4899" style="background:#ec4899"></button>
        </div>
        <div class="new-collection-actions">
          <button id="save-collection-btn" class="btn btn-primary btn-xs">Crear</button>
          <button id="cancel-collection-btn" class="btn btn-ghost btn-xs">Cancelar</button>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="save-btn" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        Guardar
      </button>
      <button id="discard-btn" class="btn btn-ghost">
        Descartar
      </button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
    <span id="toast-message">Guardado</span>
  </div>

  <!-- Footer -->
  <footer class="popup-footer">
    <a id="library-link" href="#" class="footer-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
      Abrir Biblioteca
    </a>
    <a id="sidepanel-link" href="#" class="footer-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
      Panel Lateral
    </a>
  </footer>

  <script src="../utils/db.js"></script>
  <script src="../utils/url.js"></script>
  <script src="../utils/search.js"></script>
  <script src="../utils/auto-tagger.js"></script>
  <script src="../utils/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
