<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CleanNews Vault - Lector</title>
  <link rel="stylesheet" href="reader.css">
</head>
<body>
  <!-- Top Bar -->
  <header class="reader-topbar">
    <div class="topbar-inner">
      <button id="back-btn" class="btn btn-ghost btn-sm">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        Volver
      </button>
      <div class="topbar-actions">
        <button id="favorite-btn" class="btn btn-ghost btn-sm" title="Favorito">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
          <span>Favorito</span>
        </button>
        <button id="edit-btn" class="btn btn-ghost btn-sm" title="Editar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
          <span>Editar</span>
        </button>
        <div class="export-dropdown">
          <button id="export-btn" class="btn btn-ghost btn-sm" title="Exportar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            <span>Exportar</span>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
          <div id="export-menu" class="export-menu hidden">
            <button data-format="txt" class="export-option">Texto (.txt)</button>
            <button data-format="md" class="export-option">Markdown (.md)</button>
            <button data-format="json" class="export-option">JSON (.json)</button>
          </div>
        </div>
        <button id="delete-btn" class="btn btn-ghost btn-sm btn-delete" title="Eliminar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          <span>Eliminar</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="reader-main">
    <article class="reader-article">
      <!-- View Mode -->
      <div id="view-mode" class="view-mode">
        <header class="article-header">
          <h1 id="article-title" class="article-title"></h1>
          <div class="article-meta">
            <span id="article-author" class="meta-item">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              <span></span>
            </span>
            <span id="article-source" class="meta-item meta-source">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
              <a id="source-link" href="#" target="_blank"><span></span></a>
            </span>
            <span id="article-date" class="meta-item">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
              <span></span>
            </span>
            <span id="article-stats" class="meta-item meta-stats"></span>
          </div>
          <div id="article-tags" class="article-tags"></div>
        </header>

        <div id="article-content" class="article-content"></div>

        <div id="article-notes-section" class="notes-section hidden">
          <h3 class="notes-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            Notas
          </h3>
          <p id="article-notes" class="notes-text"></p>
        </div>
      </div>

      <!-- Edit Mode -->
      <div id="edit-mode" class="edit-mode hidden">
        <div class="edit-group">
          <label for="edit-title">Título</label>
          <input type="text" id="edit-title" class="edit-input">
        </div>
        <div class="edit-group">
          <label for="edit-tags">Etiquetas (separadas por comas)</label>
          <input type="text" id="edit-tags" class="edit-input" placeholder="tecnología, ciencia, opinión...">
        </div>
        <div class="edit-group">
          <label for="edit-notes">Notas</label>
          <textarea id="edit-notes" class="edit-textarea" rows="4" placeholder="Añade tus notas aquí..."></textarea>
        </div>
        <div class="edit-group">
          <label for="edit-content">Contenido</label>
          <textarea id="edit-content" class="edit-textarea" rows="16"></textarea>
        </div>
        <div class="edit-actions">
          <button id="save-edit" class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            Guardar Cambios
          </button>
          <button id="cancel-edit" class="btn btn-secondary">Cancelar</button>
        </div>
      </div>
    </article>
  </main>

  <!-- Delete Modal -->
  <div id="delete-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h3>¿Eliminar artículo?</h3>
      <p>Esta acción no se puede deshacer. El artículo será eliminado permanentemente.</p>
      <div class="modal-actions">
        <button id="confirm-delete" class="btn btn-danger">Eliminar</button>
        <button id="cancel-delete" class="btn btn-secondary">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
    <span id="toast-message"></span>
  </div>

  <script src="../utils/storage.js"></script>
  <script src="../utils/export.js"></script>
  <script src="reader.js"></script>
</body>
</html>
